<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snippets</title>
  <link rel="stylesheet" href="snippets.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar nav -->
    <aside class="nav">
      <div class="nav-logo">
        <span>Snippets</span>
      </div>
      <div class="nav-search">
        <input id="search" type="text" placeholder="Search…" />
      </div>
      <div id="chat-list" class="chat-list"></div>

      <div class="nav-export-group">
        <button id="export-json-btn" title="Download as JSON">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708z"/></svg>
          JSON
        </button>
        <button id="export-md-btn" title="Download as Markdown">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708z"/></svg>
          Markdown
        </button>
      </div>

      <div class="nav-divider"></div>

      <div class="nav-footer">
        <button class="nav-footer-btn" id="settings-nav-btn">
          <span class="nav-footer-icon">⚙</span>
          Settings
        </button>
        <!-- Inline settings panel — hidden by default -->
        <div id="settings-panel" class="settings-panel hidden">
          <div class="settings-panel-label">Active Sites</div>
          <div id="sites-list"></div>
          <div class="add-site-row">
            <input id="new-site-input" type="text" placeholder="gemini.google.com" />
            <button class="btn-add-site" id="add-site-btn">+</button>
          </div>
          <div class="settings-error" id="site-error"></div>
        </div>
      </div>
    </aside>

    <!-- Main content: snippets view (always visible) -->
    <main class="main" id="view-snippets">
      <div class="main-header">
        <div>
          <h1 id="main-title">All Snippets</h1>
          <p id="main-subtitle" class="subtitle"></p>
        </div>
      </div>
      <div id="snippets-container"></div>
    </main>
  </div>

  <!-- Note edit modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h2>Notes</h2>
      <div id="modal-snippet-preview" class="modal-preview"></div>
      <textarea id="modal-notes" placeholder="Add your notes here…" rows="5"></textarea>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn-secondary">Cancel</button>
        <button id="modal-save" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="snippets.js"></script>
</body>
</html>
